services:
  angular-app:
    build: .
    container_name: angular_dev_container
    ports:
      - "4200:4200"
    volumes:
      # Sincroniza el código fuente
      - .:/app
      # Protege los node_modules para rendimiento óptimo en Docker
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true # Necesario para detectar cambios en Windows/WSL
    stdin_open: true
    tty: true